<!DOCTYPE html>
<html lang="en">
<head><title>Airport Terminal</title>
    <style>img{
         width: 100vw;
            height: 100vh;
            object-fit: cover;
    }
    h1{
    position: absolute;
  top: 50%;         
  left: 50%;        
  transform: translate(-50%, -50%); 
  color: #FF3131;
  font-family: sans-serif;
  font-weight: bold;
  font-size: 100px;
  text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7); 
  animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
    0% { opacity: 1; }
    50% { opacity: 0.3; }
    100% { opacity: 1; }
}
    </style>
</head>
<body>
    <img src="security.jpg" alt="security">
    <h1>Illegal Entry?</h1>
</body>
</html>
